<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePay - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h3><i class="fas fa-user me-2"></i> <span id="welcomeMessage"></span></h3>
            <h5><i class="fas fa-wallet me-2"></i> Wallet Balance: ₹<span id="balance"></span></h5>
            <div class="mt-4">
                <button class="btn btn-primary me-2" onclick="window.location.href='pay.html'"><i class="fas fa-paper-plane me-1"></i> Send Money</button>
                <button class="btn btn-secondary me-2" id="addMoneyBtn"><i class="fas fa-plus-circle me-1"></i> Add Money</button>
                <button class="btn btn-info me-2" onclick="window.location.href='history.html'"><i class="fas fa-history me-1"></i> View History</button>
                <button class="btn btn-danger" id="resetBtn"><i class="fas fa-sync-alt me-1"></i> Reset Data</button>
            </div>
            <!-- Security Note: In real systems, implement role-based access (user vs. merchant) with JWT. -->
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="app.js"></script>
    <script>
        loadDashboard();
        document.getElementById('addMoneyBtn').addEventListener('click', addMoney);
        document.getElementById('resetBtn').addEventListener('click', resetData);
    </script>
</body>
</html>
