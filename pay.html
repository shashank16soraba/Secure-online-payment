<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePay - Send Money</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h3><i class="fas fa-paper-plane me-2"></i> Send Money</h3>
            <form id="paymentForm">
                <div class="mb-3">
                    <label for="receiver" class="form-label"><i class="fas fa-user me-1"></i> Receiver Name/Email</label>
                    <input type="text" class="form-control" id="receiver" placeholder="Enter name or email" required>
                </div>
                <div class="mb-3">
                    <label for="amount" class="form-label"><i class="fas fa-rupee-sign me-1"></i> Amount (₹)</label>
                    <input type="number" class="form-control" id="amount" min="1" placeholder="Enter amount" required>
                </div>
                <div class="mb-3">
                    <label for="method" class="form-label"><i class="fas fa-credit-card me-1"></i> Payment Method</label>
                    <select class="form-select" id="method" required>
                        <option value="">Select</option>
                        <option value="UPI">UPI</option>
                        <option value="Card">Card</option>
                        <option value="Wallet">Wallet</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-lock me-1"></i> Pay Securely</button>
            </form>
            <div id="loading" class="mt-3 text-center" style="display: none;">
                <div class="spinner-border" role="status"></div>
                <p>Processing Payment...</p>
            </div>
            <!-- Security Note: Tokenization replaces sensitive data with tokens; E2EE ensures data is encrypted end-to-end. -->
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('paymentForm').addEventListener('submit', handlePayment);
    </script>
</body>
</html>
